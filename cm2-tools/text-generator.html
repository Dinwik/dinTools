<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>CM2 Text Generator</title>
	<link rel="stylesheet" href="../style.css">
    <script src="cm2.js"></script> 
    <script>
        function generateText() {
            const text = document.getElementById("textInput").value;
            const spacing = 0.45;
            setup();
            let col = 0;
            let line = 0;
            for (let i = 0; i < text.length; i++) {
                let charCode = text.charCodeAt(i);
                switch(charCode) {
                    case 9:
                        col += 4*spacing;
                        break;
                    case 10:
                        col = 0;
                        line++;
                        break;
                    default:
                        addBlock(13, 0, col, 0, line, charCode);
                        col += spacing;
                }
            }
            copy(compileData());
        }
    </script>
</head>
<body>
	<div class="linkBox">
        <div class="przycisk" onClick="openLink('cm2hub.html')">
            Return
        </div>
    </div>
    
    <div class="generator">
        Enter text here: <br><br>
        <textarea id="textInput" rows="10" cols="50" wrap="soft" style="white-space: pre-wrap; word-wrap: break-word;"></textarea><br><br>

        <div class="przycisk" onClick="generateText()">
            Click to copy CM2 string. 
        </div>
    </div>
    <script src="../tabfix.js"></script>
    <script src="../button.js"></script>
</body>
</html>
